                        { q: "The woman ______ is talking to the teacher is my mother.", options: ["who", "whom", "which", "whose"], a: 0 },
                        { q: "He asked me what I ______ at that moment.", options: ["do", "did", "was doing", "am doing"], a: 2 },
                        { q: "This question is ______ than the previous one.", options: ["easy", "easier", "easiest", "more easy"], a: 1 },
                        { q: "They haven't finished their homework ______.", options: ["already", "yet", "just", "never"], a: 1 },
                        { q: "If I were you, I ______ harder.", options: ["will study", "study", "would study", "studied"], a: 2 },
                        { q: "Turn ______ the TV, please. I want to watch the news.", options: ["off", "on", "up", "down"], a: 1 },
                        { q: "She used to ______ a model when she was young.", options: ["be", "being", "been", "was"], a: 0 },
                        { q: "The children are very interested ______ the story.", options: ["in", "on", "at", "with"], a: 0 },
                        { q: "She said that she ______ her homework.", options: ["had done", "did", "does", "will do"], a: 0 },
                        { q: "Let's go for a walk, ______?", options: ["shall we", "will we", "don't we", "can we"], a: 0 },
                        { q: "Find the error: <u>My</u> father <u>don't</u> like <u>coffee</u>.", options: ["My", "don't", "like", "coffee"], a: 1 },
                        { q: "Find the error: She <u>is</u> <u>the</u> most <u>intelligent</u> student <u>between</u> her friends.", options: ["is", "the", "intelligent", "between"], a: 3 },
                        { q: "Choose the word CLOSEST in meaning to 'happy':", options: ["sad", "glad", "angry", "upset"], a: 1 },
                        { q: "Choose the word OPPOSITE in meaning to 'empty':", options: ["full", "vacant", "clean", "large"], a: 0 }
                    ]
                },
                10: {
                    time: 45,
                    questions: [
                        { q: "Choose the word with a different pronunciation: <u>fl</u>ower, <u>fl</u>y, <u>fl</u>ood, <u>fl</u>at.", options: ["flower", "fly", "flood", "flat"], a: 2 },
                        { q: "Choose the word with a different pronunciation: <u>s</u>ure, <u>s</u>un, <u>s</u>oap, <u>s</u>and.", options: ["sure", "sun", "soap", "sand"], a: 0 },
                        { q: "Choose the word with a different stress pattern: 'picture', 'camera', 'family', 'surprise'.", options: ["picture", "camera", "family", "surprise"], a: 3 },
                        { q: "Choose the word with a different stress pattern: 'interesting', 'comfortable', 'wonderful', 'important'.", options: ["interesting", "comfortable", "wonderful", "important"], a: 3 },
                        { q: "I am looking forward to ______ from you soon.", options: ["hear", "hearing", "heard", "be heard"], a: 1 },
                        { q: "The teacher asked me why I ______ late.", options: ["am", "was", "had been", "have been"], a: 1 },
                        { q: "This is the man ______ car was stolen last night.", options: ["who", "whom", "which", "whose"], a: 3 },
                        { q: "If I ______ her phone number, I would call her.", options: ["know", "knew", "known", "had known"], a: 1 },
                        { q: "We haven't seen each other ______ we graduated.", options: ["since", "for", "in", "during"], a: 0 },
                        { q: "She works ______ than anyone else in the office.", options: ["harder", "more harder", "hardest", "hard"], a: 0 },
                        { q: "The children insisted ______ going to the zoo.", options: ["of", "on", "at", "in"], a: 1 },
                        { q: "I wish I ______ a computer at home.", options: ["have", "had", "will have", "having"], a: 1 },
                        { q: "She told me that she ______ me the following day.", options: ["will visit", "visits", "would visit", "has visited"], a: 2 },
                        { q: "Please turn ______ the radio; it's too loud.", options: ["up", "down", "on", "off"], a: 1 },
                        { q: "He used to ______ television a lot when he was young.", options: ["watch", "watched", "watching", "watches"], a: 0 },
                        { q: "This is the first time I ______ to a foreign country.", options: ["travel", "traveled", "have traveled", "had traveled"], a: 2 },
                        { q: "Find the error: She <u>told</u> me <u>that</u> she <u>is</u> happy <u>with</u> her job.", options: ["told", "that", "is", "with"], a: 2 },
                        { q: "Find the error: <u>The</u> man <u>which</u> is <u>speaking</u> to the teacher <u>is</u> my brother.", options: ["The", "which", "speaking", "is"], a: 1 },
                        { q: "Choose the word CLOSEST in meaning to 'start':", options: ["finish", "end", "begin", "stop"], a: 2 },
                        { q: "Choose the word OPPOSITE in meaning to 'cold':", options: ["freezing", "cool", "warm", "hot"], a: 3 }
                    ]
                }
            }
        };

        // ==========================================
        // LOGIC
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject');
        const examId = urlParams.get('id');

        let currentQuestions = [];
        if (examDatabase[subject] && examDatabase[subject][examId]) {
            currentQuestions = examDatabase[subject][examId].questions;
            const subjectName = subject === 'math' ? 'Toán' : 'Tiếng Anh';
            document.getElementById('examTitle').innerText = `Đề ${subjectName} 0${examId}`;
            renderQuestions();
        } else {
            document.getElementById('questionsContainer').innerHTML = `<div class="bg-red-50 text-red-600 p-6 rounded-lg text-center">Dữ liệu đề thi này đang được cập nhật. Em hãy làm đề khác nhé.</div>`;
            const btn = document.querySelector('button');
            if (btn) btn.style.display = 'none';
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            let html = '';
            currentQuestions.forEach((q, qIndex) => {
                let optionsHtml = '';
                q.options.forEach((opt, optIndex) => {
                    optionsHtml += `
                        <label class="block p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-blue-50 transition-colors">
                            <input type="radio" name="q${qIndex}" value="${optIndex}" class="mr-3 h-4 w-4 text-blue-600">
                            <span>${opt}</span>
                        </label>
                    `;
                });
                html += `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h3 class="font-bold text-lg mb-4 text-gray-800"><span class="text-blue-600">Câu ${qIndex + 1}:</span> ${q.q}</h3>
                        <div class="space-y-3">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        let timeLeft = 45 * 60;
        let timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                submitExam();
                return;
            }
            timeLeft--;
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);

        function submitExam() {
            clearInterval(timerInterval);
            let score = 0;
            const total = currentQuestions.length;

            currentQuestions.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (selected && parseInt(selected.value) === q.a) {
                    score++;
                }
            });

            const finalScore = total > 0 ? ((score / total) * 10).toFixed(1) : 0;
            localStorage.setItem(`${subject}_${examId}_score`, finalScore);
            document.getElementById('scoreDisplay').innerText = finalScore;
            document.getElementById('resultModal').classList.remove('hidden');
        }
    </script>
</body>
</html>
