<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện Thi THCS — Toán & Tiếng Anh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f172a;
  --navy2: #1e293b;
  --navy3: #334155;
  --gold: #f59e0b;
  --gold2: #fbbf24;
  --gold-dim: rgba(245,158,11,0.12);
  --teal: #0ea5e9;
  --green: #10b981;
  --red: #ef4444;
  --white: #f8fafc;
  --muted: #94a3b8;
  --card: rgba(30,41,59,0.95);
  --radius: 16px;
  --shadow: 0 25px 60px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== BACKGROUND ===== */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(14,165,233,0.08) 0%, transparent 60%),
              radial-gradient(ellipse 60% 80% at 80% 90%, rgba(245,158,11,0.06) 0%, transparent 60%),
              linear-gradient(160deg, #0f172a 0%, #0c1628 50%, #0f1f2e 100%);
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ===== SCREENS ===== */
.screen { position: relative; z-index: 1; display: none; }
.screen.active { display: flex; }

/* ===== HOME SCREEN ===== */
#home {
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform:none; } }

.brand {
  text-align: center;
  margin-bottom: 56px;
}
.brand-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--gold-dim);
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: 100px;
  padding: 6px 18px;
  font-size: 12px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--gold2); text-transform: uppercase;
  margin-bottom: 24px;
}
.brand h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 6vw, 64px);
  font-weight: 900;
  line-height: 1.1;
  background: linear-gradient(135deg, #f8fafc 30%, var(--gold2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.brand p {
  color: var(--muted); font-size: 16px; margin-top: 12px;
  font-weight: 300; letter-spacing: 0.3px;
}

/* Subject tabs */
.subject-tabs {
  display: flex; gap: 12px; margin-bottom: 32px;
}
.subject-tab {
  flex: 1; padding: 14px 32px;
  background: var(--navy2);
  border: 2px solid transparent;
  border-radius: 100px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 600;
  color: var(--muted); cursor: pointer;
  transition: all 0.25s;
}
.subject-tab.active {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold2);
}
.subject-tab:hover:not(.active) { border-color: var(--navy3); color: var(--white); }

/* Exam grid */
.exam-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  max-width: 700px;
  width: 100%;
}
@media (max-width: 600px) { .exam-grid { grid-template-columns: repeat(5, 1fr); gap: 8px; } }

.exam-card {
  aspect-ratio: 1;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  cursor: pointer;
  transition: all 0.25s;
  backdrop-filter: blur(10px);
}
.exam-card:hover {
  transform: translateY(-4px);
  border-color: var(--gold);
  box-shadow: 0 12px 40px rgba(245,158,11,0.15);
}
.exam-card .num {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 700;
  color: var(--white);
}
.exam-card .label {
  font-size: 10px; font-weight: 500;
  color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
}
.exam-card .pills {
  display: flex; gap: 4px; margin-top: 4px;
}
.pill {
  font-size: 9px; font-weight: 600; padding: 2px 7px;
  border-radius: 100px; letter-spacing: 0.5px;
}
.pill.q { background: rgba(14,165,233,0.2); color: var(--teal); }
.pill.t { background: rgba(16,185,129,0.2); color: var(--green); }

/* ===== EXAM SCREEN ===== */
#exam {
  min-height: 100vh;
  flex-direction: row;
  align-items: flex-start;
}

/* Sidebar */
.sidebar {
  width: 280px; min-height: 100vh;
  background: var(--navy2);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  padding: 24px 20px;
  flex-shrink: 0;
  position: sticky; top: 0;
}
.sidebar-header {
  margin-bottom: 24px;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: none; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 8px 14px; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  cursor: pointer; transition: all 0.2s; margin-bottom: 16px;
}
.back-btn:hover { border-color: var(--muted); color: var(--white); }
.sidebar-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700; color: var(--white);
  margin-bottom: 4px;
}
.sidebar-sub { font-size: 12px; color: var(--muted); }

/* Timer */
.timer-box {
  background: var(--navy); border-radius: 12px;
  padding: 16px; margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.06);
  text-align: center;
}
.timer-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.timer-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 36px; font-weight: 600;
  color: var(--green);
  transition: color 0.5s;
}
.timer-value.warn { color: var(--gold); }
.timer-value.danger { color: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

/* Progress */
.progress-info {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--muted); margin-bottom: 6px;
}
.progress-bar {
  height: 4px; background: var(--navy3); border-radius: 2px;
  margin-bottom: 20px;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--teal), var(--gold));
  transition: width 0.4s;
}

/* Question nav grid */
.nav-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
.qnav-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  margin-bottom: 24px;
}
.qnav-btn {
  aspect-ratio: 1;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  background: var(--navy);
  font-size: 12px; font-weight: 500;
  color: var(--muted); cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.qnav-btn.current { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.qnav-btn.answered { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.4); color: var(--green); }
.qnav-btn.answered.current { border-color: var(--gold); }

/* Submit */
.submit-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--gold), #d97706);
  border: none; border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--navy); cursor: pointer;
  transition: all 0.2s;
  margin-top: auto;
}
.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(245,158,11,0.4); }

/* Main content */
.main-content {
  flex: 1; padding: 40px;
  display: flex; flex-direction: column;
  max-width: 760px;
}

/* Question card */
.q-card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 36px; margin-bottom: 24px;
  backdrop-filter: blur(10px);
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity:0; transform: translateX(16px); } to { opacity:1; transform:none; } }

.q-num {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  color: var(--gold); text-transform: uppercase; margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.q-num::after { content:''; flex:1; height:1px; background: rgba(245,158,11,0.2); }

.q-text {
  font-size: 17px; line-height: 1.7; color: var(--white);
  font-weight: 400; margin-bottom: 32px;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 12px; }
.option-btn {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 20px;
  background: rgba(255,255,255,0.03);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  cursor: pointer; transition: all 0.2s;
  text-align: left; width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; color: var(--white);
}
.option-btn:hover { border-color: var(--teal); background: rgba(14,165,233,0.06); }
.option-btn.selected { border-color: var(--gold); background: var(--gold-dim); color: var(--gold2); }
.option-btn.correct { border-color: var(--green); background: rgba(16,185,129,0.12); color: var(--green); }
.option-btn.wrong { border-color: var(--red); background: rgba(239,68,68,0.1); color: var(--red); }

.opt-letter {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  flex-shrink: 0; transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace;
}
.option-btn.selected .opt-letter { background: var(--gold); color: var(--navy); }
.option-btn.correct .opt-letter { background: var(--green); color: var(--white); }
.option-btn.wrong .opt-letter { background: var(--red); color: var(--white); }

/* Navigation buttons */
.nav-btns {
  display: flex; gap: 12px;
}
.nav-btn {
  padding: 12px 28px; border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.nav-btn.prev {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,0.12);
  color: var(--muted);
}
.nav-btn.prev:hover { border-color: var(--white); color: var(--white); }
.nav-btn.next {
  background: var(--teal); border: none; color: var(--white);
  flex: 1;
}
.nav-btn.next:hover { background: #0284c7; transform: translateY(-1px); }

/* ===== RESULT SCREEN ===== */
#result {
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px;
  animation: fadeIn 0.5s ease;
}
.result-card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 48px;
  max-width: 600px; width: 100%;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow);
}
.score-ring {
  width: 160px; height: 160px;
  border-radius: 50%;
  margin: 0 auto 32px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}
.score-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.score-ring circle { fill: none; stroke-width: 10; }
.score-ring .bg { stroke: rgba(255,255,255,0.06); }
.score-ring .fg { stroke: var(--gold); stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
.score-number {
  font-family: 'Playfair Display', serif;
  font-size: 48px; font-weight: 900;
  line-height: 1;
  background: linear-gradient(135deg, var(--white), var(--gold2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.score-denom { font-size: 14px; color: var(--muted); margin-top: 2px; }
.result-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 700; margin-bottom: 8px;
}
.result-msg { color: var(--muted); font-size: 15px; margin-bottom: 32px; }
.result-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; margin-bottom: 32px;
}
.stat-box {
  background: var(--navy2); border-radius: 12px; padding: 16px;
  border: 1px solid rgba(255,255,255,0.06);
}
.stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px; font-weight: 600; margin-bottom: 4px;
}
.stat-val.green { color: var(--green); }
.stat-val.red { color: var(--red); }
.stat-val.muted { color: var(--muted); }
.stat-lbl { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

.result-actions { display: flex; gap: 12px; }
.ra-btn {
  flex: 1; padding: 14px 20px; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.ra-btn.primary { background: var(--gold); border: none; color: var(--navy); }
.ra-btn.primary:hover { background: var(--gold2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,158,11,0.3); }
.ra-btn.secondary { background: transparent; border: 1.5px solid rgba(255,255,255,0.12); color: var(--white); }
.ra-btn.secondary:hover { border-color: var(--white); }

/* Responsive */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main-content { padding: 24px 16px; max-width: 100%; }
}

/* Mobile header strip */
.mobile-header {
  display: none;
  background: var(--navy2);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 12px 16px;
  align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
@media (max-width: 900px) {
  .mobile-header { display: flex; }
  #exam { flex-direction: column; }
}
.mobile-timer {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 600; color: var(--green);
}
.mobile-timer.warn { color: var(--gold); }
.mobile-timer.danger { color: var(--red); }
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-grid"></div>

<!-- ===== HOME ===== -->
<div id="home" class="screen active">
  <div class="brand">
    <div class="brand-badge">⭐ Luyện Thi THCS 2024</div>
    <h1>Bộ Đề Kiểm Tra<br>Toán & Tiếng Anh</h1>
    <p>10 đề mỗi môn · 20 câu/đề · 45 phút làm bài</p>
  </div>

  <div class="subject-tabs">
    <button class="subject-tab active" onclick="switchSubject('math')">📐 Toán học</button>
    <button class="subject-tab" onclick="switchSubject('english')">📖 Tiếng Anh</button>
  </div>

  <div class="exam-grid" id="examGrid"></div>
</div>

<!-- ===== EXAM ===== -->
<div id="exam" class="screen">
  <!-- Mobile header -->
  <div class="mobile-header">
    <button class="back-btn" onclick="goHome()" style="margin:0; border:none; background:none; padding:0;">← Thoát</button>
    <div>
      <div class="mobile-timer" id="mobileTimer">45:00</div>
    </div>
    <div id="mobileProgress" style="font-size:13px;color:var(--muted)">0/20</div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <button class="back-btn" onclick="goHome()">← Thoát</button>
      <div class="sidebar-title" id="sidebarTitle">Đề 1</div>
      <div class="sidebar-sub" id="sidebarSub">Toán học · 20 câu</div>
    </div>

    <div class="timer-box">
      <div class="timer-label">⏱ Thời gian còn lại</div>
      <div class="timer-value" id="timerDisplay">45:00</div>
    </div>

    <div class="progress-info">
      <span id="progressText">Câu 1/20</span>
      <span id="answeredText">0 đã trả lời</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="nav-label">Bảng câu hỏi</div>
    <div class="qnav-grid" id="qnavGrid"></div>

    <button class="submit-btn" onclick="submitExam()">Nộp bài →</button>
  </div>

  <!-- Main -->
  <div class="main-content">
    <div class="q-card">
      <div class="q-num" id="qNum">Câu 01</div>
      <div class="q-text" id="qText">Loading...</div>
      <div class="options" id="optionsContainer"></div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn prev" onclick="navigate(-1)">← Trước</button>
      <button class="nav-btn next" onclick="navigate(1)" id="nextBtn">Tiếp theo →</button>
    </div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="result" class="screen">
  <div class="result-card">
    <div class="score-ring" id="scoreRing">
      <svg viewBox="0 0 160 160">
        <circle class="bg" cx="80" cy="80" r="70"/>
        <circle class="fg" cx="80" cy="80" r="70" id="scoreCircle"
          stroke-dasharray="439.8" stroke-dashoffset="439.8"/>
      </svg>
      <div>
        <div class="score-number" id="scoreNum">0</div>
        <div class="score-denom" id="scoreDenom">/ 20 câu</div>
      </div>
    </div>
    <div class="result-title" id="resultTitle">Xuất sắc! 🎉</div>
    <div class="result-msg" id="resultMsg">Bạn đã hoàn thành bài thi.</div>
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-val green" id="statCorrect">0</div>
        <div class="stat-lbl">Đúng</div>
      </div>
      <div class="stat-box">
        <div class="stat-val red" id="statWrong">0</div>
        <div class="stat-lbl">Sai</div>
      </div>
      <div class="stat-box">
        <div class="stat-val muted" id="statSkip">0</div>
        <div class="stat-lbl">Bỏ qua</div>
      </div>
    </div>
    <div class="result-actions">
      <button class="ra-btn primary" onclick="retakeExam()">Làm lại đề này</button>
      <button class="ra-btn secondary" onclick="goHome()">Về trang chủ</button>
    </div>
  </div>
</div>

<script>
// ==========================================
// DATABASE — 10 ĐỀ x 20 CÂU x 2 MÔN (Unicode math, no LaTeX)
// ==========================================
const examDatabase = {
  math: {
    1: { time: 45, questions: [
      { q: "Rút gọn biểu thức A = √16 + √9.", options: ["7","5","12","25"], a: 0 },
      { q: "Giải phương trình x² − 5x + 6 = 0. Tổng các nghiệm là:", options: ["-5","5","6","-6"], a: 1 },
      { q: "Một nón có bán kính đáy r = 3 cm, chiều cao h = 4 cm. Đường sinh l của nón là:", options: ["5 cm","7 cm","4 cm","3 cm"], a: 0 },
      { q: "Diện tích xung quanh nón (r = 3, l = 5, π ≈ 3,14) là:", options: ["47,1 cm²","37,68 cm²","18,84 cm²","94,2 cm²"], a: 0 },
      { q: "Hệ số góc của đường thẳng y = 2x − 3 là:", options: ["-3","2","3","-2"], a: 1 },
      { q: "Giá trị của hàm số y = −x² tại x = −2 là:", options: ["4","-4","2","-2"], a: 1 },
      { q: "Biểu thức √(x − 2) xác định khi:", options: ["x > 2","x < 2","x ≥ 2","x ≤ 2"], a: 2 },
      { q: "Trong các hàm số sau, hàm số nào đồng biến trên ℝ?", options: ["y = −3x + 1","y = 2x − 5","y = −x","y = 4 − x"], a: 1 },
      { q: "Căn bậc hai số học của 49 là:", options: ["-7","7","±7","2401"], a: 1 },
      { q: "Tích hai nghiệm của phương trình x² − 4x + 3 = 0 là:", options: ["4","3","-4","-3"], a: 1 },
      { q: "Số nào sau đây là số vô tỉ?", options: ["√4","√9","√2","√16"], a: 2 },
      { q: "Phương trình x² − 2x + 1 = 0 có bao nhiêu nghiệm?", options: ["0","1","2","Vô số"], a: 1 },
      { q: "Hàm số y = x² − 2x + 3 tại x = 1 có giá trị bằng:", options: ["0","1","2","3"], a: 2 },

// ==========================================
// APP STATE
// ==========================================
let state = {
  subject: 'math',
  examNum: 1,
  questions: [],
  answers: [],    // null = unanswered
  current: 0,
  timeLeft: 0,
  timer: null,
  submitted: false
};

// ==========================================
// HOME SCREEN
// ==========================================
function switchSubject(sub) {
  state.subject = sub;
  document.querySelectorAll('.subject-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && sub==='math') || (i===1 && sub==='english'));
  });
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('examGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const ex = examDatabase[state.subject][i];
    const card = document.createElement('div');
    card.className = 'exam-card';
    card.innerHTML = `
      <div class="num">${i < 10 ? '0'+i : i}</div>
      <div class="label">Đề số ${i}</div>
      <div class="pills">
        <span class="pill q">${ex.questions.length} câu</span>
        <span class="pill t">${ex.time} ph</span>
      </div>
    `;
    card.onclick = () => startExam(state.subject, i);
    grid.appendChild(card);
  }
}

// ==========================================
// EXAM START
// ==========================================
function startExam(sub, num) {
  state.subject = sub;
  state.examNum = num;
  const ex = examDatabase[sub][num];
  state.questions = ex.questions;
  state.answers = new Array(state.questions.length).fill(null);
  state.current = 0;
  state.timeLeft = ex.time * 60;
  state.submitted = false;

  const subLabel = sub === 'math' ? 'Toán học' : 'Tiếng Anh';
  document.getElementById('sidebarTitle').textContent = `Đề ${num}`;
  document.getElementById('sidebarSub').textContent = `${subLabel} · ${state.questions.length} câu`;

  buildQNav();
  renderQuestion();
  updateProgress();
  startTimer();
  showScreen('exam');
}

// ==========================================
// TIMER
// ==========================================
function startTimer() {
  clearInterval(state.timer);
  updateTimerDisplay();
  state.timer = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft <= 0) {
      clearInterval(state.timer);
      submitExam(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(state.timeLeft / 60);
  const s = state.timeLeft % 60;
  const str = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const timerEl = document.getElementById('timerDisplay');
  const mobileEl = document.getElementById('mobileTimer');

  let cls = '';
  if (state.timeLeft <= 60) cls = 'danger';
  else if (state.timeLeft <= 300) cls = 'warn';

  timerEl.textContent = str;
  timerEl.className = 'timer-value ' + cls;
  mobileEl.textContent = str;
  mobileEl.className = 'mobile-timer ' + cls;
}

// ==========================================
// RENDER QUESTION
// ==========================================
function renderQuestion() {
  const q = state.questions[state.current];
  const n = state.current;

  document.getElementById('qNum').textContent = `Câu ${String(n+1).padStart(2,'0')} / ${state.questions.length}`;
  document.getElementById('qText').innerHTML = q.q;

  const letters = ['A','B','C','D'];
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    if (state.answers[n] === i) btn.classList.add('selected');

    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });

  // Update nav button
  const nextBtn = document.getElementById('nextBtn');
  if (state.current === state.questions.length - 1) {
    nextBtn.textContent = 'Câu cuối ✓';
  } else {
    nextBtn.textContent = 'Tiếp theo →';
  }

  // Update qnav
  document.querySelectorAll('.qnav-btn').forEach((b, i) => {
    b.classList.toggle('current', i === n);
  });

}

function selectAnswer(idx) {
  if (state.submitted) return;
  state.answers[state.current] = idx;
  renderQuestion();
  updateProgress();
  updateQNav();
}

// ==========================================
// NAVIGATION
// ==========================================
function navigate(dir) {
  const next = state.current + dir;
  if (next < 0 || next >= state.questions.length) return;
  state.current = next;
  renderQuestion();
}

function buildQNav() {
  const grid = document.getElementById('qnavGrid');
  grid.innerHTML = '';
  state.questions.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'qnav-btn';
    btn.textContent = i + 1;
    btn.onclick = () => { state.current = i; renderQuestion(); };
    grid.appendChild(btn);
  });
}

function updateQNav() {
  document.querySelectorAll('.qnav-btn').forEach((b, i) => {
    b.classList.remove('answered','current');
    if (state.answers[i] !== null) b.classList.add('answered');
    if (i === state.current) b.classList.add('current');
  });
}

function updateProgress() {
  const answered = state.answers.filter(a => a !== null).length;
  const total = state.questions.length;
  document.getElementById('progressText').textContent = `Câu ${state.current+1}/${total}`;
  document.getElementById('answeredText').textContent = `${answered} đã trả lời`;
  document.getElementById('progressFill').style.width = `${(answered/total)*100}%`;
  document.getElementById('mobileProgress').textContent = `${answered}/${total}`;
  updateQNav();
}

// ==========================================
// SUBMIT
// ==========================================
function submitExam(auto = false) {
  if (state.submitted) return;

  const answered = state.answers.filter(a => a !== null).length;
  if (!auto && answered < state.questions.length) {
    const unanswered = state.questions.length - answered;
    if (!confirm(`Bạn còn ${unanswered} câu chưa trả lời. Bạn có chắc muốn nộp bài không?`)) return;
  }

  clearInterval(state.timer);
  state.submitted = true;

  // Calculate score
  let correct = 0;
  state.questions.forEach((q, i) => {
    if (state.answers[i] === q.a) correct++;
  });

  const wrong = state.answers.filter((a, i) => a !== null && a !== state.questions[i].a).length;
  const skip = state.answers.filter(a => a === null).length;
  const total = state.questions.length;

  // Show result
  document.getElementById('scoreNum').textContent = correct;
  document.getElementById('scoreDenom').textContent = `/ ${total} câu`;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statSkip').textContent = skip;

  const pct = Math.round((correct/total)*100);
  let title, msg;
  if (pct >= 90) { title = 'Xuất sắc! 🎉'; msg = `Bạn đạt ${pct}% — Kết quả tuyệt vời!`; }
  else if (pct >= 70) { title = 'Khá giỏi! 👍'; msg = `Bạn đạt ${pct}% — Cố gắng thêm nhé!`; }
  else if (pct >= 50) { title = 'Trung bình 📚'; msg = `Bạn đạt ${pct}% — Ôn tập thêm nhé.`; }
  else { title = 'Cần cố gắng hơn 💪'; msg = `Bạn đạt ${pct}% — Đừng nản lòng!`; }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;

  // Animate circle
  const circumference = 439.8;
  const circle = document.getElementById('scoreCircle');
  const offset = circumference - (pct / 100) * circumference;
  setTimeout(() => { circle.style.strokeDashoffset = offset; }, 100);

  // Score circle color
  if (pct >= 70) circle.style.stroke = 'var(--green)';
  else if (pct >= 50) circle.style.stroke = 'var(--gold)';
  else circle.style.stroke = 'var(--red)';

  showScreen('result');
}

function retakeExam() {
  startExam(state.subject, state.examNum);
}

function goHome() {
  clearInterval(state.timer);
  state.submitted = false;
  showScreen('home');
}

// ==========================================
// SCREEN MANAGEMENT
// ==========================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ==========================================
// INIT
// ==========================================
renderGrid();
</script>
