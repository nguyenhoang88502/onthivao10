<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Luyện Thi Lớp 10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0fdf4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .course-card { transition: all 0.3s; }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-white shadow-sm border-b border-green-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-green-700">🚀 Luyện Thi Lớp 10</h1>
            <div class="font-semibold text-gray-600">Sĩ tử: <span class="text-blue-600">Em Trai</span></div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-8 border border-gray-100">
            <h2 class="text-lg font-bold mb-4">Tiến độ ôn tập chung</h2>
            <div class="w-full bg-gray-200 rounded-full h-4 mb-2 overflow-hidden">
                <div id="progressBar" class="bg-gradient-to-r from-green-400 to-blue-500 h-4 rounded-full transition-all duration-1000" style="width: 0%"></div>
            </div>
            <p class="text-sm text-gray-500 text-right"><span id="completedCount">0</span>/20 Đề hoàn thành</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div>
                <div class="flex items-center gap-3 mb-6">
                    <div class="text-3xl">📐</div>
                    <h2 class="text-2xl font-black text-blue-700">Bộ 10 Đề Toán Thực Tế</h2>
                </div>
                <div id="mathList" class="space-y-4">
                    </div>
            </div>

            <div>
                <div class="flex items-center gap-3 mb-6">
                    <div class="text-3xl">🌍</div>
                    <h2 class="text-2xl font-black text-pink-600">Bộ 10 Đề Tiếng Anh</h2>
                </div>
                <div id="englishList" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // Render 10 đề cho mỗi môn
        function renderTests(subject, prefix, containerId, colorClass) {
            const container = document.getElementById(containerId);
            let completed = 0;

            for (let i = 1; i <= 10; i++) {
                const scoreKey = `${subject}_${i}_score`;
                const savedScore = localStorage.getItem(scoreKey);
                
                let statusHtml = '';
                let buttonHtml = `<a href="exam.html?subject=${subject}&id=${i}" class="bg-${colorClass}-100 text-${colorClass}-700 hover:bg-${colorClass}-200 px-4 py-2 rounded-lg font-bold transition-colors">Làm bài</a>`;

                if (savedScore !== null) {
                    completed++;
                    statusHtml = `<span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-full">Điểm: ${savedScore}/10</span>`;
                    buttonHtml = `<a href="exam.html?subject=${subject}&id=${i}" class="text-gray-500 hover:text-${colorClass}-600 underline text-sm">Làm lại</a>`;
                }

                const card = `
                    <div class="course-card bg-white p-5 rounded-xl border border-gray-100 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg text-gray-800">${prefix} 0${i}</h3>
                            <div class="mt-1">${statusHtml}</div>
                        </div>
                        <div>${buttonHtml}</div>
                    </div>
                `;
                container.innerHTML += card;
            }
            return completed;
        }

        const mathCompleted = renderTests('math', 'Đề Toán', 'mathList', 'blue');
        const engCompleted = renderTests('english', 'Đề Tiếng Anh', 'englishList', 'pink');
        
        // Cập nhật thanh tiến độ
        const totalCompleted = mathCompleted + engCompleted;
        document.getElementById('completedCount').innerText = totalCompleted;
        document.getElementById('progressBar').style.width = `${(totalCompleted / 20) * 100}%`;
    </script>
</body>
</html>
